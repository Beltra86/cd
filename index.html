<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
body{
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg,#1f2937,#111827); /* sfondo scuro e gradiente */
    margin: 0;
    padding: 40px;
    color: white;
}

#countdowns{
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.card{
    border-radius: 16px;
    padding: 20px;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    background: rgba(255,255,255,0.05); /* leggero sfondo trasparente per contrasto */
}

.title{
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 15px;
    text-align: center;
}

.time-grid{
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
}

.box{
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
}

.number{
    font-size: 22px;
    font-weight: 700;
}

.label{
    font-size: 11px;
}
</style>

</head>
<body>

<div id="countdowns"></div>

<script>
const colors=[
"#6366f1",
"#ef4444",
"#10b981",
"#f59e0b",
"#3b82f6",
"#8b5cf6",
"#ec4899",
"#14b8a6"
];

async function loadCountdowns(){
    const response = await fetch("countdowns.json");
    const data = await response.json();

    const now = new Date();

    const countdowns = data.countdowns
        .filter(c => new Date(c.date) > now)
        .sort((a,b) => new Date(a.date)-new Date(b.date));

    const container = document.getElementById("countdowns");

    countdowns.forEach((cd,i)=>{
        const color = colors[i % colors.length];

        const card = document.createElement("div");
        card.className = "card";
        card.style.border = `2px solid ${color}`;

        card.innerHTML = `
            <div class="title">${cd.title}</div>
            <div class="time-grid">
                <div class="box">
                    <div class="number n1" data-date="${cd.date}">0</div>
                    <div class="label l1"></div>
                </div>
                <div class="box">
                    <div class="number n2" data-date="${cd.date}">0</div>
                    <div class="label l2"></div>
                </div>
                <div class="box">
                    <div class="number n3" data-date="${cd.date}">0</div>
                    <div class="label l3"></div>
                </div>
            </div>
        `;
        container.appendChild(card);
    });

    startTimer();
}

// Calcolo anni, mesi, giorni, ore, minuti, secondi reali
function diffParts(now,target){
    let years = target.getFullYear() - now.getFullYear();
    let months = target.getMonth() - now.getMonth();
    let days = target.getDate() - now.getDate();
    let hours = target.getHours() - now.getHours();
    let minutes = target.getMinutes() - now.getMinutes();
    let seconds = target.getSeconds() - now.getSeconds();

    if(seconds < 0){ seconds += 60; minutes--; }
    if(minutes < 0){ minutes += 60; hours--; }
    if(hours < 0){ hours += 24; days--; }
    if(days < 0){
        let prevMonth = new Date(target.getFullYear(), target.getMonth(),0).getDate();
        days += prevMonth;
        months--;
    }
    if(months < 0){ months += 12; years--; }

    return {years,months,days,hours,minutes,seconds};
}

function startTimer(){
    function update(){
        const now = new Date();

        document.querySelectorAll(".card").forEach(card=>{
            const date = card.querySelector(".n1").dataset.date;
            const target = new Date(date);
            const diff = target - now;

            if(diff <= 0){ card.remove(); return; }

            const p = diffParts(now,target);

            let v1,v2,v3;
            let l1,l2,l3;

            if(p.years>0){
                v1=p.years; l1="anni";
                v2=p.months; l2="mesi";
                v3=p.days; l3="giorni";
            }
            else if(p.months>0){
                v1=p.months; l1="mesi";
                v2=p.days; l2="giorni";
                v3=p.hours; l3="ore";
            }
            else if(p.days>0){
                v1=p.days; l1="giorni";
                v2=p.hours; l2="ore";
                v3=p.minutes; l3="min";
            }
            else{
                v1=p.hours; l1="ore";
                v2=p.minutes; l2="min";
                v3=p.seconds; l3="sec";
            }

            card.querySelector(".n1").textContent = v1;
            card.querySelector(".n2").textContent = v2;
            card.querySelector(".n3").textContent = v3;

            card.querySelector(".l1").textContent = l1;
            card.querySelector(".l2").textContent = l2;
            card.querySelector(".l3").textContent = l3;
        });
    }

    update();
    setInterval(update,1000);
}

loadCountdowns();
</script>

</body>
</html>
